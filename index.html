<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WebMessenger</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <h1>✨ Мессенджер</h1>
      <input type="text" id="username" placeholder="Ваше имя" maxlength="20">
      <button id="join-btn">Войти</button>
    </div>
  </div>

  <div id="chat-screen" style="display:none">
    <div class="chat-header">
      <span>📱 Чат</span>
      <span id="user-count"></span>
    </div>
    <div id="messages" class="messages"></div>
    <div class="input-area">
      <button id="voice-btn" class="icon-btn">🎤</button>
      <button id="sticker-btn" class="icon-btn">😊</button>
      <input type="text" id="message-input" placeholder="Сообщение...">
      <button id="send-btn" class="icon-btn">📤</button>
    </div>
    <div id="sticker-panel" style="display:none" class="sticker-panel">
      <span class="sticker">😀</span>
      <span class="sticker">😂</span>
      <span class="sticker">🥰</span>
      <span class="sticker">😎</span>
      <span class="sticker">🤔</span>
      <span class="sticker">😭</span>
      <span class="sticker">🔥</span>
      <span class="sticker">💩</span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
